; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
framework = arduino
lib_deps = 
	gyverlibs/mString@^1.7.3
	bodmer/TFT_eSPI@^2.5.43
	teemuatlut/TMCStepper@^0.7.3
	spacehuhn/SimpleCLI@^1.1.4
	gyverlibs/GyverIO@^1.3.12
	gyverlibs/EncButton@^3.7.3
	gyverlibs/GyverStepper@^2.7
	gyverlibs/GyverDB@^1.4.3
	gyverlibs/StringN
	wollewald/INA226_WE@^1.3.0
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
monitor_speed = 1000000
monitor_filters = esp32_exception_decoder
build_type = release
upload_speed = 921600
board_build.partitions = partitions.csv
upload_port = COM20
monitor_port = COM20
debug_init_break = thb app_main
build_flags = 
	
	-D USER_SETUP_LOADED=1
	-include "include/User_Setup.h"
build_src_filter = 
	+<*>
	-<ble/>
	-<wifi/>
