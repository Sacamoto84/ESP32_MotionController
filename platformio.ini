; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	gyverlibs/mString@^1.7.3
	bodmer/TFT_eSPI@^2.5.43
	teemuatlut/TMCStepper@^0.7.3
	spacehuhn/SimpleCLI@^1.1.4
	gyverlibs/GyverIO@^1.3.12
	gyverlibs/EncButton@^3.7.3
	gyverlibs/GyverStepper@^2.7
	mathieucarbou/ESPAsyncWebServer@^3.6.0
	jchristensen/JC_EEPROM@^1.0.9
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_type = release
upload_speed = 921600
board_build.partitions = partitions.csv

[env:esp32-s3]
platform = espressif32
board = esp32-s3-wroom-1
framework = arduino
lib_deps = 
	gyverlibs/mString@^1.7.3
	bodmer/TFT_eSPI@^2.5.43
	teemuatlut/TMCStepper@^0.7.3
	spacehuhn/SimpleCLI@^1.1.4
	gyverlibs/GyverIO@^1.3.12
	gyverlibs/EncButton@^3.7.3
	gyverlibs/GyverStepper@^2.7
	mathieucarbou/ESPAsyncWebServer@^3.6.0
	jchristensen/JC_EEPROM@^1.0.9
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.flash_size = 8MB
board_build.psram_mode = qio
board_build.psram_size = 2MB
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_type = release
upload_speed = 921600
board_build.partitions = partitions.csv

[env:adafruit_feather_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

board_build.psram_type = ap_3v3

upload_port = COM20
monitor_port = COM21

;board_build.flash_mode = qio
;board_build.flash_size = 8MB
;board_build.partitions = default_8MB.csv

;board_build.arduino.psram_type = opi
;board_build.psram_type = opi

build_flags = 
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCONFIG_SPIRAM_SIZE=2097152
	-DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
	;-DCONFIG_SPIRAM_MODE_OCT=1
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43