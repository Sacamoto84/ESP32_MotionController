[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3

framework = arduino
lib_deps = 
	gyverlibs/mString@^1.7.3
	bodmer/TFT_eSPI@^2.5.43
	teemuatlut/TMCStepper@^0.7.3
	spacehuhn/SimpleCLI@^1.1.4
	gyverlibs/GyverIO@^1.3.12
	gyverlibs/EncButton@^3.7.3
	gyverlibs/GyverStepper@^2.7
	;jchristensen/JC_EEPROM@^1.0.9

board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
;board_build.flash_mode = dio
;board_build.flash_size = 8MB
;board_build.psram_mode = qio
;board_build.psram_size = 2MB
monitor_speed = 1000000
monitor_filters = esp32_exception_decoder
build_type = release
upload_speed = 921600
board_build.partitions = partitions.csv
;board_build.psram_type = ap_3v3
upload_port = COM21
monitor_port = COM21

debug_init_break = thb app_main

; Разрешаем использовать std::string без проблем
;libcxx_enable_exceptions = false
;libcxx_enable_rtti = false

build_flags = 
	;-std=gnu++17
    ;-DCORE_DEBUG_LEVEL=0
	;-DBOARD_HAS_PSRAM
	;-DARDUINO_USB_CDC_ON_BOOT=1
	;-DCONFIG_SPIRAM_SIZE=2097152
	;-DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
	;-DCONFIG_SPIRAM_MODE_OCT=1

	;-flto

	-D USER_SETUP_LOADED=1
	-include "include/User_Setup.h"

build_src_filter =
	+<*>
	-<ble/>
	-<wifi/>
	
;upload_protocol = espota

;upload_port = 192.168.1.123
;upload_port = my-esp32s3.local

;upload_flags =
;	--port=3232
;	--auth=123456
